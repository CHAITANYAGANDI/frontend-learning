<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NorthLedger Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">

</head>
<body>

    <header>
        <div class="logo-box">
            <p>N</p>
        </div>
        <div>
            <p class="app-name">NorthLedger</p>
            <p class="app-subtitle">Personal finance dashboard</p>
        </div>
    </header>

    <main>

        <section class="dashboard-container">

            <div class="dashboard-top">
                <div>
                    <div class="dashboard-heading">
                        <h1>Dashboard</h1>
                    </div>

                    <div class="welcome-message">
                        <p>Welcome to your NorthLedger dashboard.</p>
                    </div>
                </div>
                <button type="button" id="logout-button">Logout</button>
            </div>

            <div class="summary-grid">

                <div class="summary-card">
                    <p>Total Balance</p>
                    <p class="values" id="total-balance-value">$0.00</p>
                </div>

                <div class="summary-card">
                    <p>Current Month Credit</p>
                    <p class="values" id="current-credit-value">$0.00</p>
                </div>
                
                <div class="summary-card">
                    <p>Current Month Debit</p>
                    <p class="values" id="current-debit-value">$0.00</p>
                </div>

            </div>

        </section>

    </main>
    
<script src="dashboard.js"></script>
</body>
</html>
